name: Update wallet-core Submodule & Release

on:
  repository_dispatch:
    types: [wallet-core-updated]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Update submodule to latest
        run: |
          cd third_party/wallet-core
          git fetch origin
          git checkout main 2>/dev/null || git checkout master
          git pull
          cd ../..

      - name: Check for submodule changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Submodule already up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version in pubspec.yaml
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT → $NEW_VERSION"

      - name: Commit & tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add third_party/wallet-core pubspec.yaml
          git commit -m "chore: sync wallet-core upstream, bump to v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.new_version }}"
